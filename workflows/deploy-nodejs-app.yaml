name: deploy-nodejs-app
version: 1.0.0
description: Deploy a Node.js application with testing and Docker
author: E-CLI Team
tags:
  - nodejs
  - deployment
  - docker
  - ci-cd

parameters:
  - name: app_name
    type: string
    required: true
    description: Application name
  - name: run_tests
    type: boolean
    default: true
    description: Run tests before deployment
  - name: docker_registry
    type: string
    required: false
    description: Docker registry URL

steps:
  - name: Check git status
    tool: skill:git-helper
    parameters:
      operation: status

  - name: Install dependencies
    tool: skill:npm-helper
    parameters:
      operation: install

  - name: Run tests
    tool: skill:npm-helper
    parameters:
      operation: run
      script: test
    condition: run_tests == True

  - name: Build application
    tool: skill:npm-helper
    parameters:
      operation: run
      script: build

  - name: Build Docker image
    tool: shell
    parameters:
      command: docker build -t ${app_name}:latest .

  - name: Tag image for registry
    tool: shell
    parameters:
      command: docker tag ${app_name}:latest ${docker_registry}/${app_name}:latest
    condition: docker_registry != None

  - name: Push to registry
    tool: shell
    parameters:
      command: docker push ${docker_registry}/${app_name}:latest
    condition: docker_registry != None

  - name: Show deployment summary
    tool: shell
    parameters:
      command: echo "Deployment complete for ${app_name}"
